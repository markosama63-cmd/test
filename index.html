<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diagonal Difference Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      color: #64748b;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .controls label {
      color: #94a3b8;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .controls input[type=number] {
      width: 80px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input[type=number]:focus { border-color: #38bdf8; }

    .method-toggle {
      display: flex;
      gap: 8px;
    }

    .method-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: transparent;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .method-btn.active {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border-color: transparent;
      color: #fff;
    }

    /* Matrix grid */
    #matrix-grid {
      display: inline-grid;
      gap: 8px;
      margin-top: 4px;
    }

    .matrix-cell {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: all 0.2s;
      font-family: 'Courier New', monospace;
    }

    .matrix-cell:focus { border-color: #38bdf8; background: #0c1a2e; }
    .matrix-cell.main-diag { border-color: #38bdf8; background: #0c233e; color: #38bdf8; }
    .matrix-cell.anti-diag { border-color: #818cf8; background: #17143a; color: #818cf8; }
    .matrix-cell.both-diag { border-color: #a78bfa; background: #150e30; color: #c4b5fd; }

    /* Calculate button */
    #calc-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    #calc-btn:hover { opacity: 0.9; }
    #calc-btn:active { transform: scale(0.98); }

    /* Steps */
    .steps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
    }

    .steps-table th {
      color: #64748b;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 12px 10px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }

    .steps-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #1e2d40;
    }

    .steps-table tr:last-child td { border-bottom: none; }

    .steps-table .row-num { color: #64748b; }
    .main-val { color: #38bdf8; font-weight: 700; }
    .anti-val { color: #818cf8; font-weight: 700; }
    .running { color: #94a3b8; font-size: 0.8rem; }

    .totals-row td {
      border-top: 1px solid #334155 !important;
      padding-top: 14px !important;
      font-weight: 700;
    }

    /* Result banner */
    .result-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
    }

    .result-formula {
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: #94a3b8;
    }

    .result-formula span { color: #e2e8f0; font-weight: 700; }

    .result-value {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: #64748b;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .dot-main { background: #38bdf8; }
    .dot-anti { background: #818cf8; }
    .dot-both { background: #c4b5fd; }

    #results-section { display: none; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 10px;
    }

    .badge-iter { background: #0e3a52; color: #38bdf8; }
    .badge-rec  { background: #1e1a45; color: #818cf8; }
  </style>
</head>
<body>

<header>
  <h1>Diagonal Difference Calculator</h1>
  <p>Visualize iterative &amp; recursive solutions side by side</p>
</header>

<!-- Setup card -->
<div class="card">
  <h2>Setup</h2>
  <div class="controls">
    <label>Matrix size n &times; n</label>
    <input type="number" id="size-input" value="3" min="1" max="8" />
    <div class="method-toggle">
      <button class="method-btn active" data-method="iterative">Iterative</button>
      <button class="method-btn" data-method="recursive">Recursive</button>
      <button class="method-btn" data-method="both">Both</button>
    </div>
  </div>
</div>

<!-- Matrix card -->
<div class="card">
  <h2>Matrix Input</h2>
  <div id="matrix-grid"></div>
  <div class="legend" id="legend" style="display:none;">
    <div class="legend-item"><div class="legend-dot dot-main"></div> Main diagonal (arr[i][i])</div>
    <div class="legend-item"><div class="legend-dot dot-anti"></div> Anti-diagonal (arr[i][n-1-i])</div>
    <div class="legend-item"><div class="legend-dot dot-both"></div> Both diagonals</div>
  </div>
  <br/>
  <button id="calc-btn">Calculate</button>
</div>

<!-- Results card -->
<div class="card" id="results-section">
  <h2 id="results-title">Results</h2>
  <div id="results-body"></div>
</div>

<script>
  let method = 'iterative';
  let n = 3;

  // Method toggle
  document.querySelectorAll('.method-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      method = btn.dataset.method;
    });
  });

  // Build matrix grid
  function buildGrid() {
    n = Math.max(1, Math.min(8, parseInt(document.getElementById('size-input').value) || 3));
    const grid = document.getElementById('matrix-grid');
    grid.style.gridTemplateColumns = `repeat(${n}, 58px)`;
    grid.innerHTML = '';
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        const inp = document.createElement('input');
        inp.type = 'number';
        inp.className = 'matrix-cell';
        inp.value = 0;
        inp.dataset.row = i;
        inp.dataset.col = j;
        colorCell(inp, i, j);
        inp.addEventListener('focus', () => inp.select());
        grid.appendChild(inp);
      }
    }
    document.getElementById('legend').style.display = 'flex';
    document.getElementById('results-section').style.display = 'none';
  }

  function colorCell(inp, i, j) {
    const isMain = i === j;
    const isAnti = i + j === n - 1;
    inp.classList.remove('main-diag','anti-diag','both-diag');
    if (isMain && isAnti) inp.classList.add('both-diag');
    else if (isMain)      inp.classList.add('main-diag');
    else if (isAnti)      inp.classList.add('anti-diag');
  }

  document.getElementById('size-input').addEventListener('change', buildGrid);

  // Read matrix values
  function getMatrix() {
    const arr = Array.from({length: n}, () => Array(n).fill(0));
    document.querySelectorAll('.matrix-cell').forEach(inp => {
      arr[inp.dataset.row][inp.dataset.col] = parseInt(inp.value) || 0;
    });
    return arr;
  }

  // Iterative simulation
  function simulateIterative(arr) {
    const steps = [];
    let ltr = 0, rtl = 0;
    for (let i = 0; i < n; i++) {
      const mv = arr[i][i], av = arr[i][n - 1 - i];
      ltr += mv; rtl += av;
      steps.push({ row: i, mainVal: mv, antiVal: av, ltrRunning: ltr, rtlRunning: rtl });
    }
    return { steps, ltr, rtl, result: Math.abs(ltr - rtl) };
  }

  // Recursive simulation (trace)
  function simulateRecursive(arr) {
    const steps = [];
    let ltr = 0, rtl = 0;
    function rec(i) {
      if (i === n) return;
      const mv = arr[i][i], av = arr[i][n - 1 - i];
      ltr += mv; rtl += av;
      steps.push({ row: i, mainVal: mv, antiVal: av, ltrRunning: ltr, rtlRunning: rtl });
      rec(i + 1);
    }
    rec(0);
    return { steps, ltr, rtl, result: Math.abs(ltr - rtl) };
  }

  function renderResult(label, badgeClass, sim) {
    return `
      <div style="margin-bottom:24px;">
        <div style="font-size:0.8rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">
          ${label} <span class="badge ${badgeClass}">${badgeClass === 'badge-iter' ? 'O(1) space' : 'O(n) space'}</span>
        </div>
        <table class="steps-table">
          <thead>
            <tr>
              <th>Row</th>
              <th>Main diag</th>
              <th>Running</th>
              <th>Anti diag</th>
              <th>Running</th>
            </tr>
          </thead>
          <tbody>
            ${sim.steps.map(s => `
              <tr>
                <td class="row-num">[${s.row}]</td>
                <td class="main-val">+${s.mainVal}</td>
                <td class="running">= ${s.ltrRunning}</td>
                <td class="anti-val">+${s.antiVal}</td>
                <td class="running">= ${s.rtlRunning}</td>
              </tr>
            `).join('')}
            <tr class="totals-row">
              <td class="row-num">Total</td>
              <td class="main-val" colspan="2">${sim.ltr}</td>
              <td class="anti-val" colspan="2">${sim.rtl}</td>
            </tr>
          </tbody>
        </table>
        <br/>
        <div class="result-banner">
          <div class="result-formula">
            |<span>${sim.ltr}</span> &minus; <span>${sim.rtl}</span>|
          </div>
          <div class="result-value">${sim.result}</div>
        </div>
      </div>`;
  }

  document.getElementById('calc-btn').addEventListener('click', () => {
    const arr = getMatrix();
    const section = document.getElementById('results-section');
    const body    = document.getElementById('results-body');
    const title   = document.getElementById('results-title');

    section.style.display = 'block';

    if (method === 'iterative') {
      title.textContent = 'Results — Iterative';
      body.innerHTML = renderResult('Iterative Method', 'badge-iter', simulateIterative(arr));
    } else if (method === 'recursive') {
      title.textContent = 'Results — Recursive';
      body.innerHTML = renderResult('Recursive Method', 'badge-rec', simulateRecursive(arr));
    } else {
      title.textContent = 'Results — Comparison';
      const iter = simulateIterative(arr);
      const rec  = simulateRecursive(arr);
      body.innerHTML =
        renderResult('Iterative Method', 'badge-iter', iter) +
        '<hr style="border-color:#334155;margin:8px 0 24px"/>' +
        renderResult('Recursive Method', 'badge-rec', rec) +
        `<div style="margin-top:16px;padding:16px;background:#0f172a;border-radius:10px;text-align:center;">
           <span style="color:#64748b;font-size:0.85rem;">Both methods agree: </span>
           <span style="font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
             ${iter.result === rec.result ? '✓ ' + iter.result : '✗ Mismatch'}
           </span>
         </div>`;
    }

    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // Init
  buildGrid();
</script>
</body>
</html>
